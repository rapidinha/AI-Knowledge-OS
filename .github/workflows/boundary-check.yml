name: Boundary check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  forbidden-paths:
    name: Reject private lab paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if forbidden paths exist at repo root
        run: |
          set -euo pipefail
          # Root-only: templates/instance/<name> is allowed (structure scaffold).
          forbidden=(
            knowledge
            notes
            research
            journals
            experiments
            obsidian
            vault
          )
          found=0
          for name in "${forbidden[@]}"; do
            if [ -e "$name" ]; then
              echo "::error::Forbidden path at repository root: $name/"
              echo "Use templates/instance/ on public trees; keep personal SoT private."
              found=1
            fi
          done
          if [ "$found" -ne 0 ]; then
            echo "Personal lab paths must never appear at upstream root. See GOVERNANCE.md"
            exit 1
          fi
          echo "Boundary check passed."
