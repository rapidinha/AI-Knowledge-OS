name: Pytest

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Providers and boundary tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest tests/providers/signals tests/test_boundary_scaffold.py -q
